name: Publishing build

on:
  release:
    types: [created]

jobs:
  publish:
    name: Release build and publish
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v2
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17

        # Base64 decodes and pipes the GPG key content into the secret file
      #- name: Prepare environment
       # env:
        #  GPG_KEY_CONTENTS: ${{ secrets.GPG_KEY_CONTENTS }}
       #   SIGNING_SECRET_KEY_RING_FILE: ${{ secrets.SECRET_KEY_RING_FILE }}
       # run: |
        #  git fetch --unshallow
         # sudo bash -c "echo '$GPG_KEY_CONTENTS' | base64 -d > '$SIGNING_SECRET_KEY_RING_FILE'"

        # Builds the release artifacts of the library
      - name: Release build
        run: cd AndroidLibrary && ./gradlew clean :purchasely-lib:assembleRelease

        # Generates other artifacts (javadocJar is optional)
      #- name: Source jar and dokka
      #  run: ./gradlew androidSourcesJar javadocJar

        # Publish dependency
      - name: Publish to MavenCentral
        run: ./gradlew :purchasely-lib:publishReleasePublicationToSnapshotRepository -max-workers 1
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          SECRET_KEY_RING_FILE: ${{ secrets.SECRET_KEY_RING_FILE }}
          SONATYPE_STAGING_PROFILE_ID: ${{ secrets.SONATYPE_STAGING_PROFILE_ID }}

        # Close and release the repository
      - name: Close and Release Maven Central
        run: ./gradlew closeAndReleaseRepository
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          SECRET_KEY_RING_FILE: ${{ secrets.SECRET_KEY_RING_FILE }}
          SONATYPE_STAGING_PROFILE_ID: ${{ secrets.SONATYPE_STAGING_PROFILE_ID }}
