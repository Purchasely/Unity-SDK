plugins {
    id 'com.android.application'
}

apply plugin: 'com.huawei.agconnect'

android {
    namespace 'com.purchasely.unity'
    compileSdk 32

    defaultConfig {
        applicationId "com.purchasely.unity"
        minSdk 21
        targetSdk 32
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'io.purchasely:core:3.4.1'
    implementation 'io.purchasely:google-play:3.4.1'
    implementation 'io.purchasely:amazon:3.4.1'
    implementation 'io.purchasely:huawei-services:3.4.1'
}